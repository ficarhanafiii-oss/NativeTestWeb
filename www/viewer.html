<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WebRunner Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #e8ff47; --bg: #0a0a0f; }
    html, body { height: 100%; background: var(--bg); overflow: hidden; -webkit-tap-highlight-color: transparent; }

    #loading {
      position: fixed; inset: 0; z-index: 9999; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 24px; transition: opacity 0.4s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .loading-bar-wrap { width: 120px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .loading-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
    .loading-label { font-family: sans-serif; font-size: 13px; color: rgba(240,240,245,0.4); }

    #error {
      position: fixed; inset: 0; z-index: 9998; background: var(--bg);
      display: none; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; padding: 40px; text-align: center; font-family: sans-serif;
    }
    #error.show { display: flex; }
    #error h2 { font-size: 22px; font-weight: 800; color: #f0f0f5; }
    #error p { font-size: 13px; color: rgba(240,240,245,0.5); line-height: 1.7; max-width: 280px; }
    .btn-back {
      padding: 14px 32px; background: var(--accent); color: #0a0a0f;
      font-weight: 700; font-size: 14px; border: none; border-radius: 12px; cursor: pointer;
    }

    #toolbar {
      position: fixed; bottom: 24px; right: 20px; z-index: 8000;
      display: flex; flex-direction: column; gap: 10px;
      opacity: 0; transform: translateY(10px); transition: all 0.3s ease; pointer-events: none;
    }
    #toolbar.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #toolbar.hiding  { opacity: 0; transform: translateY(10px); pointer-events: none; }

    .tb-btn {
      width: 44px; height: 44px; background: rgba(20,20,28,0.92);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      backdrop-filter: blur(16px); display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tb-btn:active { transform: scale(0.92); }

    #frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; background: #fff; }

    #toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(20,20,28,0.95); border: 1px solid rgba(255,255,255,0.07);
      color: #f0f0f5; font-size: 12px; padding: 10px 18px; border-radius: 40px;
      backdrop-filter: blur(12px); opacity: 0; pointer-events: none; z-index: 9000;
      transition: all 0.3s ease; white-space: nowrap; font-family: sans-serif;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div id="loading">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect x="2" y="2" width="11" height="11" rx="2" fill="#e8ff47"/>
      <rect x="15" y="2" width="11" height="11" rx="2" fill="#e8ff47" opacity="0.5"/>
      <rect x="2" y="15" width="11" height="11" rx="2" fill="#e8ff47" opacity="0.5"/>
      <rect x="15" y="15" width="11" height="11" rx="2" fill="#e8ff47"/>
    </svg>
    <div class="loading-bar-wrap">
      <div class="loading-bar" id="loadBar"></div>
    </div>
    <p class="loading-label">Memuat file...</p>
  </div>

  <div id="error">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" stroke="#ff5050" stroke-width="1.5"/>
      <path d="M24 14v14M24 34v2" stroke="#ff5050" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <h2>Gagal Memuat</h2>
    <p id="errMsg">File tidak dapat dibuka.</p>
    <button class="btn-back" onclick="goBack()">← Kembali</button>
  </div>

  <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>

  <div id="toolbar">
    <div class="tb-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9l5 5" stroke="#f0f0f5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="tb-btn" onclick="reloadFrame()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3 9a6 6 0 1 0 1.5-3.93M3 5v4h4" stroke="#f0f0f5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="tb-btn" onclick="toggleMode()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="1" y="1" width="16" height="16" rx="2.5" stroke="#f0f0f5" stroke-width="1.5"/>
        <rect x="1" y="1" width="16" height="5" rx="2.5" fill="#f0f0f5" fill-opacity="0.2"/>
      </svg>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const fileName = params.get('name') || 'file.html';
    let currentMode = params.get('mode') || 'fullscreen';

    document.addEventListener('DOMContentLoaded', async () => {
      await applyMode(currentMode);
      loadFromStorage();
      initToolbarGesture();
    });

    function loadFromStorage() {
      setProgress(30);
      const content = sessionStorage.getItem('wr_html_content');
      if (!content) {
        showError('Tidak ada konten yang dimuat. Kembali dan pilih file lagi.');
        return;
      }

      setProgress(70);
      const frame = document.getElementById('frame');
      frame.onload = () => {
        setProgress(100);
        setTimeout(() => hideLoading(), 300);
      };
      frame.onerror = () => showError('Gagal merender HTML.');

      // Pakai srcdoc bukan blob URL — tidak ada limit ukuran,
      // dan semua aset sudah di-inline dari app.js jadi pasti ke-load
      frame.srcdoc = content;
    }

    function reloadFrame() {
      hideToolbar();
      loadFromStorage();
    }

    async function applyMode(mode) {
      if (!window.Capacitor) return;
      try {
        const { StatusBar } = Capacitor.Plugins;
        if (mode === 'fullscreen') {
          await StatusBar?.hide();
        } else {
          await StatusBar?.show();
          await StatusBar?.setStyle({ style: 'Dark' });
          await StatusBar?.setBackgroundColor({ color: '#000000' });
        }
      } catch (e) {}
    }

    async function toggleMode() {
      currentMode = currentMode === 'fullscreen' ? 'normal' : 'fullscreen';
      await applyMode(currentMode);
      showToast(currentMode === 'fullscreen' ? '⛶ Full Screen' : '▣ Mode Normal');
      hideToolbar();
    }

    function goBack() {
      if (window.Capacitor) {
        try {
          Capacitor.Plugins.StatusBar?.show();
          Capacitor.Plugins.StatusBar?.setBackgroundColor({ color: '#0a0a0f' });
        } catch(e) {}
      }
      window.history.back();
    }

    function setProgress(pct) {
      document.getElementById('loadBar').style.width = pct + '%';
    }

    function hideLoading() {
      document.getElementById('loading').classList.add('hidden');
    }

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('errMsg').textContent = msg;
      document.getElementById('error').classList.add('show');
    }

    function initToolbarGesture() {
      let pressTimer;
      document.addEventListener('touchstart', (e) => {
        if (document.getElementById('toolbar').contains(e.target)) return;
        pressTimer = setTimeout(() => showToolbar(), 600);
      }, { passive: true });
      document.addEventListener('touchend', () => clearTimeout(pressTimer), { passive: true });
      document.addEventListener('touchmove', () => clearTimeout(pressTimer), { passive: true });
    }

    function showToolbar() {
      const tb = document.getElementById('toolbar');
      tb.classList.remove('hiding');
      tb.classList.add('visible');
      clearTimeout(tb._t);
      tb._t = setTimeout(() => hideToolbar(), 4000);
    }

    function hideToolbar() {
      const tb = document.getElementById('toolbar');
      tb.classList.add('hiding');
      setTimeout(() => tb.classList.remove('visible', 'hiding'), 300);
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 2500);
    }

    if (window.Capacitor) {
      Capacitor.Plugins.App?.addListener('backButton', () => goBack());
    }
  </script>
</body>
</html>
