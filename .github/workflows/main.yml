name: Build WebRunner APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Patch AndroidManifest.xml
        run: cp android-patch/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Patch file_paths.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cp android-patch/file_paths.xml android/app/src/main/res/xml/file_paths.xml

      - name: Patch MainActivity.java
        run: |
          DEST="android/app/src/main/java/com/webrunner/app/MainActivity.java"
          mkdir -p "$(dirname $DEST)"
          cp android-patch/MainActivity.java "$DEST"

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find APK
        run: find android -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: webrunner-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
